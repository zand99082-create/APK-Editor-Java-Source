name: Build APK with Apktool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Apktool
        run: |
          # دانلود از لینک جدید گیت‌هاب
          wget -O apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          echo '#!/bin/bash' > apktool
          echo 'java -jar $PWD/apktool.jar "$@"' >> apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          sudo mv apktool.jar /usr/local/bin/

      - name: Rebuild APK
        run: |
          # اگر پوشه `apk_editor_source` رو داری، ازش استفاده کن
          if [ -d "apk_editor_source" ]; then
            apktool b apk_editor_source -o app-unsigned.apk
          else
            # اگر نداری، یه APK ساده بساز برای تست
            echo "Creating a simple APK for testing..."
            mkdir -p test-apk/lib
            mkdir -p test-apk/res
            mkdir -p test-apk/smali
            echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.test.app"><application android:label="Test"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > test-apk/AndroidManifest.xml
            apktool b test-apk -o app-unsigned.apk
          fi

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android
          apksigner sign --ks debug.keystore --ks-pass pass:android app-unsigned.apk
          mv app-unsigned.apk app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Editor-Pro
          path: app-debug.apk
