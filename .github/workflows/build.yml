name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy Java sources
        run: |
          mkdir -p app/src/main/java
          cp -r sources/* app/src/main/java/ 2>/dev/null || echo "✅ sources copied"

      - name: Copy resources
        run: |
          mkdir -p app/src/main/res
          cp -r resources/* app/src/main/res/ 2>/dev/null || echo "✅ resources copied"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Editor-Pro
          path: app/build/outputs/apk/debug/*.apk
