name: Build APK from Java Source

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          mkdir -p app/src/main/java app/src/main/res app/src/main/assets
          cp -r sources/* app/src/main/java/
          cp -r resources/* app/src/main/res/ 2>/dev/null || true

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.gmail.heagoo.apkeditor.pro">
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:theme="@style/Theme.AppCompat.Light">
        <activity android:name=".MainActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
MANIFEST

          cat > app/build.gradle << 'GRADLE'
apply plugin: 'com.android.application'
android {
    namespace 'com.gmail.heagoo.apkeditor.pro'
    compileSdk 34
    defaultConfig {
        applicationId "com.gmail.heagoo.apkeditor.pro"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
GRADLE

          echo "include ':app'" > settings.gradle
          echo "rootProject.name='APKEditor'" >> settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.5.0' } }" > build.gradle

      - name: Build APK
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Editor-Build
          path: app/build/outputs/apk/debug/*.apk
